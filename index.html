<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpecDiff — PR Review Checklist Generator</title>
<meta name="description" content="Paste a diff, get a structured QA checklist. Edge cases, security flags, doc updates.">
<meta property="og:title" content="SpecDiff — PR Review Checklist">
<meta property="og:description" content="Turn git diffs into structured review checklists. No API, no signup.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--border:#30363d;
  --text:#e6edf3;--muted:#8b949e;
  --accent:#f78166;--accent-hover:#ffa28b;
  --green:#3fb950;--yellow:#d29922;--red:#f85149;--blue:#58a6ff;
  --radius:8px;
  --font-sans:'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);min-height:100dvh;line-height:1.6}
.container{max-width:900px;margin:0 auto;padding:24px 16px 80px}
header{text-align:center;margin-bottom:32px;padding-top:28px}
h1{font-size:clamp(1.8rem,4vw,2.4rem);font-weight:700;letter-spacing:-0.5px;margin-bottom:6px}
h1 .accent{color:var(--accent)}
.subtitle{color:var(--muted);font-size:.9rem}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}

textarea{
  width:100%;min-height:200px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;color:var(--text);font-family:var(--font-mono);font-size:.82rem;
  line-height:1.5;resize:vertical;outline:none;tab-size:4;
}
textarea:focus{border-color:var(--accent)}
textarea::placeholder{color:var(--muted)}

.controls{display:flex;gap:8px;margin:12px 0 0;flex-wrap:wrap}
.btn{
  background:var(--accent);color:#fff;border:none;border-radius:var(--radius);
  padding:10px 20px;font-family:var(--font-sans);font-weight:600;font-size:.88rem;
  cursor:pointer;transition:background .2s,transform .1s;white-space:nowrap;
}
.btn:hover{background:var(--accent-hover)}
.btn:active{transform:scale(0.97)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn--secondary{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn--secondary:hover{border-color:var(--muted);background:var(--surface)}
.btn--green{background:var(--green)}.btn--green:hover{background:#4cc960}

/* Output */
.output{margin-top:28px;display:none}
.output-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.output-header h2{font-size:1.1rem;font-weight:600}
.output-actions{display:flex;gap:8px}

.section{margin-bottom:24px}
.section-title{
  font-size:.82rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;
  padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.section-title .badge{
  font-size:.7rem;font-weight:600;padding:2px 8px;border-radius:10px;
  text-transform:none;letter-spacing:0;
}
.badge--red{background:rgba(248,81,73,.15);color:var(--red)}
.badge--yellow{background:rgba(210,153,34,.15);color:var(--yellow)}
.badge--blue{background:rgba(88,166,255,.15);color:var(--blue)}
.badge--green{background:rgba(63,185,80,.15);color:var(--green)}

.file-list{list-style:none;margin:0;padding:0}
.file-list li{
  font-family:var(--font-mono);font-size:.82rem;padding:5px 0;
  border-bottom:1px solid rgba(48,54,61,0.3);
  display:flex;align-items:center;gap:8px;
}
.file-list li:last-child{border-bottom:none}
.file-stat{font-size:.75rem;font-weight:500;min-width:60px}
.file-stat .add{color:var(--green)}.file-stat .del{color:var(--red)}

.checklist{list-style:none;margin:0;padding:0}
.checklist li{
  padding:6px 0;border-bottom:1px solid rgba(48,54,61,0.3);
  font-size:.9rem;display:flex;gap:8px;align-items:flex-start;
}
.checklist li:last-child{border-bottom:none}
.checklist li::before{content:'';display:inline-block;width:16px;height:16px;flex-shrink:0;
  border:1.5px solid var(--border);border-radius:3px;margin-top:3px}
.check-note{color:var(--muted);font-size:.8rem;margin-left:24px;display:block}

/* Raw markdown */
.md-raw{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 20px;font-family:var(--font-mono);font-size:.8rem;line-height:1.7;
  white-space:pre-wrap;word-break:break-word;color:var(--muted);
  max-height:500px;overflow-y:auto;display:none;
}

.empty{text-align:center;padding:32px;color:var(--muted)}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--green);color:#fff;padding:10px 24px;border-radius:var(--radius);
  font-size:.9rem;font-weight:500;opacity:0;transition:all .3s ease;
  pointer-events:none;z-index:100;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

footer{text-align:center;margin-top:48px;padding-top:24px;border-top:1px solid var(--border);font-size:.8rem;color:var(--muted)}

@media(max-width:520px){
  .controls{flex-direction:column}
  .btn{width:100%}
  .output-actions{width:100%}
  .output-actions .btn{flex:1}
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Spec<span class="accent">Diff</span></h1>
    <p class="subtitle">Paste a diff or PR description. Get a review checklist.</p>
  </header>

  <label for="diffInput" class="sr-only">Paste diff or PR description</label>
  <textarea id="diffInput" placeholder="Paste your git diff, PR description, or code changes here...&#10;&#10;Supports unified diff format (git diff, GitHub PR diffs) and plain code/text."></textarea>

  <div class="controls">
    <button class="btn" onclick="analyze()">Analyze</button>
    <button class="btn btn--secondary" onclick="loadExample()">Load Example</button>
    <button class="btn btn--secondary" onclick="clearAll()">Clear</button>
  </div>

  <div id="output" class="output">
    <div class="output-header">
      <h2>Review Checklist</h2>
      <div class="output-actions">
        <button class="btn btn--secondary" onclick="copyMarkdown()">Copy Markdown</button>
        <button class="btn btn--secondary" onclick="toggleRaw()">View Raw</button>
      </div>
    </div>
    <div id="mdRaw" class="md-raw"></div>
    <div id="checklistBody"></div>
  </div>

  <footer>Built by Rocket Labs AI</footer>
</div>

<div id="toast" class="toast" role="alert" aria-live="assertive"></div>

<script>
const $ = id => document.getElementById(id);

function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ─── Diff Parser ─────────────────────────────────────────────
function parseDiff(text) {
  const files = [];
  const lines = text.split('\n');
  let currentFile = null;

  for (const line of lines) {
    // Detect file headers
    const diffMatch = line.match(/^diff --git a\/(.+?) b\/(.+)/);
    if (diffMatch) {
      currentFile = { path: diffMatch[2], added: 0, removed: 0, hunks: [] };
      files.push(currentFile);
      continue;
    }
    // Alternative: +++ b/path
    const plusMatch = line.match(/^\+\+\+ b\/(.+)/);
    if (plusMatch && !currentFile) {
      currentFile = { path: plusMatch[1], added: 0, removed: 0, hunks: [] };
      files.push(currentFile);
      continue;
    }
    if (!currentFile) continue;

    if (line.startsWith('+') && !line.startsWith('+++')) {
      currentFile.added++;
      currentFile.hunks.push(line.substring(1));
    } else if (line.startsWith('-') && !line.startsWith('---')) {
      currentFile.removed++;
      currentFile.hunks.push(line.substring(1));
    }
  }
  return files;
}

// ─── Pattern Detectors ───────────────────────────────────────
function detectPatterns(text, files) {
  const testing = [];
  const security = [];
  const docs = [];
  const allHunks = files.flatMap(f => f.hunks).join('\n');
  const allText = text + '\n' + allHunks;

  // ── Testing patterns ──
  const newFunctions = allText.match(/^\+\s*(function\s+\w+|const\s+\w+\s*=\s*(?:async\s+)?(?:\([^)]*\)|[\w]+)\s*=>|def\s+\w+|fn\s+\w+|pub\s+fn)/gm);
  if (newFunctions) testing.push({ text: `Test ${newFunctions.length} new/modified function(s)`, note: 'Verify inputs, outputs, and error paths' });

  if (/if\s*\(|else\s*{|else\s+if|elif|switch|match\s*{|case\s+/m.test(allText))
    testing.push({ text: 'New conditional branches detected', note: 'Test both true and false paths' });

  if (/\.map\(|\.filter\(|\.reduce\(|\.forEach\(|for\s*\(|while\s*\(|\.each\b/m.test(allText))
    testing.push({ text: 'Loop/iteration changes', note: 'Test with 0, 1, and many items. Check off-by-one' });

  if (/try\s*{|catch\s*\(|\.catch\(|rescue|except\s/m.test(allText))
    testing.push({ text: 'Error handling modified', note: 'Trigger each error path. Verify messages are useful' });

  if (/async\s|await\s|Promise|\.then\(|setTimeout|setInterval/m.test(allText))
    testing.push({ text: 'Async code changes', note: 'Test race conditions, timeouts, and rejection handling' });

  if (/null|undefined|None|nil|Optional|\.?\?\.|!\./m.test(allText))
    testing.push({ text: 'Null/undefined handling', note: 'Test with missing/null values at boundaries' });

  if (/parseInt|parseFloat|Number\(|\.toFixed|Math\.|BigInt/m.test(allText))
    testing.push({ text: 'Numeric parsing/math', note: 'Test with 0, negative, NaN, very large values, decimals' });

  if (/new Date|Date\.now|moment|dayjs|toISOString|getTime/m.test(allText))
    testing.push({ text: 'Date/time handling', note: 'Test timezone edge cases, DST, epoch boundaries' });

  if (/regex|RegExp|\/[^/]+\/[gimsuy]|\.match\(|\.replace\(|\.test\(/m.test(allText))
    testing.push({ text: 'Regex patterns changed', note: 'Test edge cases: empty strings, special chars, Unicode' });

  if (/CREATE TABLE|ALTER TABLE|ADD COLUMN|DROP|MIGRATION|migrate|schema/im.test(allText))
    testing.push({ text: 'Database schema changes', note: 'Test migration up AND down. Verify existing data survives' });

  if (/cache|Cache|redis|memcache|\.set\(.*ttl|invalidat/im.test(allText))
    testing.push({ text: 'Cache logic modified', note: 'Test cache hit, miss, and invalidation paths' });

  if (/\bapi\b|endpoint|route|router|fetch\(|axios|http\./im.test(allText))
    testing.push({ text: 'API/endpoint changes', note: 'Test request/response contracts, error codes, rate limits' });

  if (/\.env|process\.env|os\.environ|config\[|settings\./m.test(allText))
    testing.push({ text: 'Configuration changes', note: 'Verify defaults work without the new config set' });

  // ── Security patterns ──
  if (/innerHTML|dangerouslySetInnerHTML|v-html|document\.write|\$\{.*\}.*html/im.test(allText))
    security.push({ text: 'Raw HTML injection risk (innerHTML/v-html)', severity: 'high' });

  if (/\breq\.body\b|\breq\.query\b|\breq\.params\b|request\.form|request\.args|user_input|getParameter/m.test(allText))
    security.push({ text: 'User input handling — validate and sanitize', severity: 'high' });

  if (/SELECT.*FROM|INSERT INTO|UPDATE.*SET|DELETE FROM|\.query\(|\.execute\(/im.test(allText))
    security.push({ text: 'SQL queries — check for injection via parameterized queries', severity: 'high' });

  if (/eval\(|exec\(|subprocess|child_process|spawn\(|shell.*true/m.test(allText))
    security.push({ text: 'Command execution — verify no user input reaches shell', severity: 'high' });

  if (/password|secret|token|api_key|apiKey|API_KEY|private_key|credentials/im.test(allText))
    security.push({ text: 'Sensitive data in code — verify not hardcoded or logged', severity: 'medium' });

  if (/auth|login|session|jwt|bearer|oauth|cookie|csrf|cors/im.test(allText))
    security.push({ text: 'Auth/session changes — review access control impact', severity: 'medium' });

  if (/\.env|process\.env|os\.environ|dotenv|config\.get/m.test(allText))
    security.push({ text: 'Environment variables — check no secrets in source', severity: 'medium' });

  if (/fs\.|readFile|writeFile|unlink|rmdir|path\.join|open\(|fopen/m.test(allText))
    security.push({ text: 'File operations — verify path traversal protection', severity: 'medium' });

  if (/redirect|window\.location|res\.redirect|header\(.*Location/im.test(allText))
    security.push({ text: 'Redirects — validate target URLs to prevent open redirect', severity: 'medium' });

  if (/CORS|Access-Control|crossorigin|cross-origin/im.test(allText))
    security.push({ text: 'CORS configuration — verify allowed origins', severity: 'medium' });

  // ── Documentation patterns ──
  const newExports = allText.match(/^\+.*(module\.exports|export\s+(default|const|function|class)|pub\s+fn|public\s+(static\s+)?[\w<>]+\s+\w+)/gm);
  if (newExports) docs.push({ text: `${newExports.length} new/changed export(s) — update API docs` });

  const sigChanges = allText.match(/^\+.*(function\s+\w+\s*\([^)]+\)|def\s+\w+\s*\([^)]+\)|\w+\s*\([^)]*\)\s*:\s*\w+)/gm);
  if (sigChanges) docs.push({ text: 'Function signature changes — update calling code and docs' });

  if (/\.env|ENV_VAR|process\.env\.\w+|os\.environ/m.test(allText))
    docs.push({ text: 'New environment variables — update .env.example and deploy docs' });

  if (/package\.json|requirements\.txt|Cargo\.toml|go\.mod|Gemfile|pyproject\.toml/m.test(files.map(f=>f.path).join('\n')))
    docs.push({ text: 'Dependency changes — update lockfile and note in changelog' });

  if (/README|CHANGELOG|docs\/|MIGRATION/im.test(files.map(f=>f.path).join('\n')))
    docs.push({ text: 'Documentation files modified — review for accuracy' });

  if (/CREATE TABLE|migration|schema/im.test(allText))
    docs.push({ text: 'Schema changes — document migration steps for deploy' });

  files.forEach(f => {
    if (/test|spec|__tests__/i.test(f.path))
      docs.push({ text: `Test file changed: ${f.path}` });
  });

  return { testing, security, docs };
}

// ─── Render ──────────────────────────────────────────────────
let lastMarkdown = '';

function analyze() {
  const text = $('diffInput').value.trim();
  if (!text) { showToast('Paste a diff first'); return; }

  const files = parseDiff(text);
  const { testing, security, docs } = detectPatterns(text, files);

  // If no diff headers found, still run pattern detection on raw text
  const hasStructure = files.length > 0 || testing.length > 0 || security.length > 0 || docs.length > 0;
  if (!hasStructure) {
    showToast('No patterns detected — try pasting a unified diff');
    return;
  }

  const body = $('checklistBody');
  body.innerHTML = '';
  $('mdRaw').style.display = 'none';

  let md = '# PR Review Checklist\n\n';

  // Files changed
  if (files.length > 0) {
    const totalAdd = files.reduce((s, f) => s + f.added, 0);
    const totalDel = files.reduce((s, f) => s + f.removed, 0);

    md += `## Files Changed (${files.length})\n\n`;
    const sec = makeSection('Files Changed', `${files.length} files`, 'blue');
    const ul = document.createElement('ul');
    ul.className = 'file-list';
    files.forEach(f => {
      const li = document.createElement('li');
      const stat = document.createElement('span');
      stat.className = 'file-stat';
      stat.innerHTML = `<span class="add">+${f.added}</span> <span class="del">-${f.removed}</span>`;
      const name = document.createElement('span');
      name.textContent = f.path;
      li.appendChild(stat);
      li.appendChild(name);
      ul.appendChild(li);
      md += `- \`${f.path}\` (+${f.added}/-${f.removed})\n`;
    });
    sec.appendChild(ul);
    body.appendChild(sec);
    md += `\n**Total:** +${totalAdd}/-${totalDel}\n\n`;
  }

  // Testing checklist
  if (testing.length > 0) {
    md += `## Testing (${testing.length})\n\n`;
    const sec = makeSection('Testing', `${testing.length} items`, 'yellow');
    const ul = makeChecklist(testing.map(t => ({ text: t.text, note: t.note })));
    sec.appendChild(ul);
    body.appendChild(sec);
    testing.forEach(t => {
      md += `- [ ] ${t.text}`;
      if (t.note) md += `\n  > ${t.note}`;
      md += '\n';
    });
    md += '\n';
  }

  // Security
  if (security.length > 0) {
    md += `## Security (${security.length})\n\n`;
    const sec = makeSection('Security', `${security.length} flags`, 'red');
    const ul = makeChecklist(security.map(s => ({
      text: s.text,
      note: `Severity: ${s.severity}`
    })));
    sec.appendChild(ul);
    body.appendChild(sec);
    security.forEach(s => {
      md += `- [ ] **[${s.severity.toUpperCase()}]** ${s.text}\n`;
    });
    md += '\n';
  }

  // Documentation
  if (docs.length > 0) {
    md += `## Documentation (${docs.length})\n\n`;
    const sec = makeSection('Documentation', `${docs.length} items`, 'green');
    const ul = makeChecklist(docs.map(d => ({ text: d.text })));
    sec.appendChild(ul);
    body.appendChild(sec);
    docs.forEach(d => { md += `- [ ] ${d.text}\n`; });
    md += '\n';
  }

  md += '---\n*Generated by [SpecDiff](https://specdiff.vercel.app)*\n';
  lastMarkdown = md;
  $('output').style.display = 'block';
}

function makeSection(title, badgeText, badgeColor) {
  const div = document.createElement('div');
  div.className = 'section';
  const h = document.createElement('div');
  h.className = 'section-title';
  h.textContent = title + ' ';
  const badge = document.createElement('span');
  badge.className = `badge badge--${badgeColor}`;
  badge.textContent = badgeText;
  h.appendChild(badge);
  div.appendChild(h);
  return div;
}

function makeChecklist(items) {
  const ul = document.createElement('ul');
  ul.className = 'checklist';
  items.forEach(item => {
    const li = document.createElement('li');
    const span = document.createElement('span');
    span.textContent = item.text;
    li.appendChild(span);
    if (item.note) {
      const note = document.createElement('span');
      note.className = 'check-note';
      note.textContent = item.note;
      span.appendChild(note);
    }
    ul.appendChild(li);
  });
  return ul;
}

function copyMarkdown() {
  navigator.clipboard.writeText(lastMarkdown)
    .then(() => showToast('Markdown copied!'))
    .catch(() => showToast('Copy failed — try selecting manually'));
}

function toggleRaw() {
  const el = $('mdRaw');
  if (el.style.display === 'none') {
    el.textContent = lastMarkdown;
    el.style.display = 'block';
  } else {
    el.style.display = 'none';
  }
}

function clearAll() {
  $('diffInput').value = '';
  $('output').style.display = 'none';
  lastMarkdown = '';
}

function loadExample() {
  $('diffInput').value = `diff --git a/src/api/auth.js b/src/api/auth.js
index 1a2b3c4..5d6e7f8 100644
--- a/src/api/auth.js
+++ b/src/api/auth.js
@@ -12,6 +12,18 @@ const jwt = require('jsonwebtoken');
+const rateLimit = require('express-rate-limit');
+
+const loginLimiter = rateLimit({
+  windowMs: 15 * 60 * 1000,
+  max: 5,
+  message: 'Too many login attempts'
+});
+
+router.post('/login', loginLimiter, async (req, res) => {
+  const { email, password } = req.body;
+  const user = await db.query('SELECT * FROM users WHERE email = $1', [email]);
+  if (!user) return res.status(401).json({ error: 'Invalid credentials' });
+  const valid = await bcrypt.compare(password, user.password_hash);
+  if (!valid) return res.status(401).json({ error: 'Invalid credentials' });
+  const token = jwt.sign({ userId: user.id, role: user.role }, process.env.JWT_SECRET);
+  res.json({ token });
+});
diff --git a/src/api/users.js b/src/api/users.js
index 2b3c4d5..6e7f8a9 100644
--- a/src/api/users.js
+++ b/src/api/users.js
@@ -1,4 +1,6 @@
+const { validateEmail } = require('../utils/validation');
+
 router.get('/profile/:id', async (req, res) => {
-  const user = await db.query('SELECT * FROM users WHERE id = ' + req.params.id);
+  const user = await db.query('SELECT id, name, email FROM users WHERE id = $1', [req.params.id]);
   res.json(user);
 });
diff --git a/migrations/002_add_role.sql b/migrations/002_add_role.sql
new file mode 100644
--- /dev/null
+++ b/migrations/002_add_role.sql
@@ -0,0 +1,3 @@
+ALTER TABLE users ADD COLUMN role TEXT DEFAULT 'user';
+CREATE INDEX idx_users_role ON users(role);
diff --git a/.env.example b/.env.example
index 3c4d5e6..7f8a9b0 100644
--- a/.env.example
+++ b/.env.example
@@ -1,2 +1,3 @@
 DATABASE_URL=postgres://localhost:5432/myapp
+JWT_SECRET=change-me-in-production
+RATE_LIMIT_WINDOW_MS=900000`;
  analyze();
}

$('diffInput').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') analyze();
});
</script>

</body>
</html>
